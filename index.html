<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfred Rico | Data Analysis Portfolio</title>

<link rel="icon" type="image/png" href="/web_icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:
radial-gradient(circle at 20% 15%,rgba(255,255,255,.03),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,.025),transparent 45%),
#1f2933;
scroll-behavior:smooth;
}

/* HERO */

.hero{
position:relative;height:32vh;min-height:240px;
display:flex;align-items:center;justify-content:center;
text-align:center;overflow:hidden;color:white;
background:
radial-gradient(circle at 20% 30%,rgba(120,120,120,.35),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(180,180,180,.25),transparent 45%),
linear-gradient(135deg,#020617,#111827 60%,#1f2933);
}

#dashboardCanvas{
position:absolute;
inset:0;
opacity:.45;
z-index:2
}

.hero-content{
position:relative;
z-index:3;
margin-top:-40px
}

.hero h1{
font-family:'IBM Plex Sans',sans-serif;
font-size:44px;
margin-bottom:6px;
}

.hero p{
font-size:16px;
color:#cbd5e1;
}

.social-links a{
color:white;
margin:0 10px;
font-size:22px
}

/* NAV */

nav{
position:sticky;
top:0;
z-index:50;
background:rgba(255,255,255,.06);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.08);
}

nav ul{
display:flex;
justify-content:center;
list-style:none;
padding:16px;
margin:0;
gap:28px;
}

nav a{
color:#e5e7eb;
text-decoration:none;
font-weight:600;
}

/* MAIN GRID */

.main-layout{
max-width:1100px;
margin:60px auto;
padding:0 30px;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-areas:
"about contact"
"projects projects"
"certifications certifications";
gap:40px;
}

#about{grid-area:about}
#contact{grid-area:contact}
#projects{grid-area:projects}
#certifications{grid-area:certifications}

h2{
text-align:center;
margin-bottom:32px;
color:white;
font-family:'IBM Plex Sans',sans-serif;
}

/* PROJECT GRID */

.projects-window{
max-width:920px;
margin:auto;
height:650px;
overflow-y:auto
}

.projects-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.project-card{
border-radius:16px;
overflow:hidden;
aspect-ratio:1;
cursor:pointer;
text-decoration:none;
color:inherit;
}

.project-card img{
width:100%;
height:100%;
object-fit:cover;
}

/* FILTER BUTTONS */

.project-filters,
.package-filters{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px
}

.filter-btn{
padding:8px 16px;
border-radius:999px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.06);
color:#e5e7eb;
cursor:pointer;
font-size:13px;
}

.filter-btn:hover{
transform:translateY(-1px) scale(1.04);
background:rgba(255,255,255,.10);
}

.filter-btn.tag-python.active{
background:linear-gradient(
90deg,
rgba(246,220,172,.26),
rgba(55,118,171,.24)
);
}

.filter-btn.tag-r.active{background:rgba(39,109,195,.22)}
.filter-btn.tag-sql.active{background:rgba(51,103,145,.22)}
.filter-btn.tag-tableau.active{background:rgba(233,118,39,.22)}
.filter-btn.tag-excel.active{background:rgba(33,115,70,.22)}
.filter-btn.tag-sheets.active{background:rgba(52,168,83,.22)}
.filter-btn.tag-all.active{background:rgba(74,144,226,.22)}

footer{
text-align:center;
padding:14px;
background:#111;
color:white
}

</style>

</head>

<body>

<header class="hero">
<canvas id="dashboardCanvas"></canvas>

<div class="hero-content">
<h1>Alfred Rico</h1>
<p>Aspiring Data Analyst</p>

<div class="social-links">
<a href="https://www.linkedin.com/in/alfred-rico-3992338a/" target="_blank"><i class="fab fa-linkedin"></i></a>
<a href="https://github.com/ShadyEggs" target="_blank"><i class="fab fa-github"></i></a>
</div>
</div>

</header>

<nav>
<ul>
<li><a href="#about">About</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#certifications">Certifications</a></li>
</ul>
</nav>

<div class="main-layout">

<section id="about">
<h2>About Me</h2>
<p style="color:white;text-align:center;">
Hi, I'm Alfred — a data analyst focused on turning messy datasets into clear, actionable insights.
</p>
</section>

<section id="contact">
<h2>Let's Connect!</h2>
<form action="https://formsubmit.co/alfred.m.rico@gmail.com" method="POST" class="contact-form">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" rows="6" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form>
</section>

<section id="projects">

<h2>My Projects</h2>

<div class="project-filters">
<button class="filter-btn active tag-all" data-filter="all">All</button>
<button class="filter-btn tag-python" data-filter="python">Python</button>
<button class="filter-btn tag-r" data-filter="r">R</button>
<button class="filter-btn tag-sql" data-filter="sql">SQL</button>
<button class="filter-btn tag-tableau" data-filter="tableau">Tableau</button>
<button class="filter-btn tag-excel" data-filter="excel">Excel</button>
<button class="filter-btn tag-sheets" data-filter="sheets">Google Sheets</button>
</div>

<div class="package-filters"></div>

<div class="projects-window">
<div class="projects-grid">

<a class="project-card"
data-tags="r dplyr tidyr ggplot2 plotly"
href="https://shadyeggs.github.io/Fifa21-Data-Cleaning-Project/"
target="_blank">

<img src="https://images.unsplash.com/photo-1518091043644-c1d4457512c6?w=800&q=80">

<div class="project-overlay">
<h3>Fifa 21 Data Cleaning</h3>
</div>

</a>

</div>
</div>
</section>

</div>

<footer>
<p>© 2026 Alfred Rico</p>
</footer>

</body>
</html>
