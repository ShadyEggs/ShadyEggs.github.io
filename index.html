/* NAV */

<script>

/* HERO DASHBOARD ANIMATION */

const canvas=document.getElementById("dashboardCanvas")
const ctx=canvas.getContext("2d")

let bars=[],particles=[]
const spacing=28
const barWidth=18

const palette=[
"rgba(52,152,219,.45)",
"rgba(26,188,156,.45)",
"rgba(160,160,160,.45)"
]

function setupCanvas(){

const hero=document.querySelector(".hero")

canvas.width=hero.offsetWidth
canvas.height=hero.offsetHeight

bars=[]
particles=[]

const count=Math.floor(canvas.width/spacing)
const totalWidth=count*spacing
const offsetX=(canvas.width-totalWidth)/2

for(let i=0;i<count;i++){

const h=Math.random()*120+60

bars.push({
x:offsetX+i*spacing,
height:h,
target:h,
color:palette[Math.floor(Math.random()*palette.length)]
})

}

for(let i=0;i<30;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+1,
speed:Math.random()*.4+.1
})
}

}

function randomizeBars(){
for(let i=0;i<6;i++){
const index=Math.floor(Math.random()*bars.length)
bars[index].target=Math.random()*120+60
}
}

setInterval(randomizeBars,5000)

function drawParticles(){

particles.forEach(p=>{

p.y-=p.speed

if(p.y<0){
p.y=canvas.height
p.x=Math.random()*canvas.width
}

ctx.fillStyle="rgba(255,255,255,.25)"
ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

}

function drawRoundedRect(x,y,w,h,r){

ctx.beginPath()
ctx.moveTo(x,y+r)
ctx.lineTo(x,y+h)
ctx.lineTo(x+w,y+h)
ctx.lineTo(x+w,y+r)
ctx.quadraticCurveTo(x+w,y,x+w-r,y)
ctx.lineTo(x+r,y)
ctx.quadraticCurveTo(x,y,x,y+r)
ctx.fill()

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawParticles()

bars.forEach(bar=>{
bar.height+=(bar.target-bar.height)*.05
ctx.fillStyle=bar.color
drawRoundedRect(bar.x,canvas.height-bar.height,barWidth,bar.height,6)
})

requestAnimationFrame(animate)

}

setupCanvas()
animate()

window.addEventListener("resize",setupCanvas)

/* FILTER SYSTEM */

const packageMap={
r:["dplyr","tidyr","ggplot2","plotly"]
}

const languageButtons=document.querySelectorAll(".filter-btn")
const packageContainer=document.querySelector(".package-filters")
const projects=[...document.querySelectorAll(".project-card")]

let activeLanguages=[]
let activePackages=[]

languageButtons.forEach(btn=>{

btn.onclick=()=>{

const filter=btn.dataset.filter

if(filter==="all"){
activeLanguages=[]
activePackages=[]
languageButtons.forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
packageContainer.innerHTML=""
showProjects()
return
}

btn.classList.toggle("active")
document.querySelector('[data-filter="all"]').classList.remove("active")

activeLanguages=[...document.querySelectorAll(".project-filters .active")]
.map(b=>b.dataset.filter)

updatePackageFilters()
showProjects()

}

})

function updatePackageFilters(){

packageContainer.innerHTML=""
activePackages=[]

activeLanguages.forEach(lang=>{
if(packageMap[lang]){

packageMap[lang].forEach(pkg=>{

const btn=document.createElement("button")
btn.className="filter-btn package-btn"
btn.textContent=pkg
btn.dataset.filter=pkg

btn.onclick=()=>{
btn.classList.toggle("active")

activePackages=[...document.querySelectorAll(".package-btn.active")]
.map(b=>b.dataset.filter)

showProjects()
}

packageContainer.appendChild(btn)

})

}

})

}

function showProjects(){

projects.forEach(card=>{

const tags=card.dataset.tags

let languageMatch=true
let packageMatch=true

if(activeLanguages.length){
languageMatch=activeLanguages.every(l=>tags.includes(l))
}

if(activePackages.length){
packageMatch=activePackages.every(p=>tags.includes(p))
}

card.classList.toggle("hide",!(languageMatch && packageMatch))

})

}

</script>
